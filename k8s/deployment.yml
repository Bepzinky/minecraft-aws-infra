apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft
  namespace: minecraft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minecraft
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: minecraft
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: minecraft
          image: 140132525527.dkr.ecr.us-east-1.amazonaws.com/mc-server-3:v1.0.2
          envFrom:
            - configMapRef:
                name: minecraft-config
          ports:
            - containerPort: 25565
              protocol: TCP
          resources:
            requests:
              memory: "3Gi"
              cpu: "500m"
            limits:
              memory: "5Gi"
              cpu: "1500m"
          startupProbe:
            tcpSocket:
              port: 25565
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 25565
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 25565
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: world-data
              mountPath: /data
      volumes:
        - name: world-data
          persistentVolumeClaim:
            claimName: minecraft-data
