---
- name: Bootstrap k3s Minecraft node
  hosts: all
  become: true
  vars:
    aws_region: "us-east-1"
    data_dir: "/opt/minecraft/data"

  tasks:

    - name: Install required packages
      yum:
        name:
          - docker
          - python3-pip
          - curl
          - unzip
        state: present

    - name: Install AWS CLI
      shell: |
        curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
        unzip -q /tmp/awscliv2.zip -d /tmp
        /tmp/aws/install --update
      args:
        creates: /usr/local/bin/aws

    - name: Install compatible urllib3 and requests
      pip:
        name:
          - "urllib3<2.0"
          - "requests"
        executable: pip3

    - name: Uninstall any broken k3s installation
      shell: |
        if [ -f /usr/local/bin/k3s-uninstall.sh ] && [ ! -f /etc/systemd/system/k3s.service ]; then
          /usr/local/bin/k3s-uninstall.sh
        fi
      changed_when: false

    - name: Install k3s pinned version v1.28.8
      shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_SKIP_SELINUX_RPM=true \
          INSTALL_K3S_VERSION="v1.28.8+k3s1" \
          sh -
      args:
        creates: /etc/systemd/system/k3s.service

    - name: Enable and start k3s service
      systemd:
        name: k3s
        state: started
        enabled: true
        daemon_reload: true

    - name: Wait for k3s API to be ready
      shell: /usr/local/bin/k3s kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get nodes
      register: k3s_ready
      retries: 30
      delay: 10
      until: k3s_ready.rc == 0
      changed_when: false

    - name: Wait for k3s API to fully initialize namespaces
      shell: /usr/local/bin/k3s kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get namespaces
      register: k3s_ns_ready
      retries: 30
      delay: 10
      until: k3s_ns_ready.rc == 0
      changed_when: false

    - name: Pause for API server to stabilize
      pause:
        seconds: 30

    - name: Get ECR login token
      shell: aws ecr get-login-password --region {{ aws_region }}
      register: ecr_token
      changed_when: false

    - name: Get ECR registry hostname
      shell: echo "{{ ecr_repo_url }}" | cut -d'/' -f1
      register: ecr_registry
      changed_when: false

    - name: Wait for k3s API to fully stabilize
      shell: |
        for i in $(seq 1 10); do
          /usr/local/bin/k3s kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get namespaces && \
          /usr/local/bin/k3s kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get pods -A && \
          echo "API stable" && exit 0
          sleep 10
        done
        exit 1
      register: api_stable
      retries: 10
      delay: 10
      until: api_stable.rc == 0
      changed_when: false

    - name: Create minecraft namespace
      shell: |
        /usr/local/bin/k3s kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml \
          get namespace minecraft || \
        /usr/local/bin/k3s kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml \
          create namespace minecraft
      changed_when: false

    - name: Create ECR imagePullSecret
      shell: |
        /usr/local/bin/k3s kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml \
          delete secret ecr-secret -n minecraft --ignore-not-found
        /usr/local/bin/k3s kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml \
          create secret docker-registry ecr-secret \
          --docker-server={{ ecr_registry.stdout }} \
          --docker-username=AWS \
          --docker-password={{ ecr_token.stdout }} \
          --namespace=minecraft
      changed_when: false

    - name: Create world data directory
      file:
        path: "{{ data_dir }}"
        state: directory
        owner: "1000"
        group: "1000"
        mode: '0755'

    - name: Restore world data from S3
      shell: |
        aws s3 sync s3://{{ s3_bucket }}/world/ {{ data_dir }}/ --no-progress
      changed_when: false

    - name: Fix permissions after restore
      file:
        path: "{{ data_dir }}"
        state: directory
        owner: "1000"
        group: "1000"
        mode: '0755'
        recurse: true

    - name: Copy k8s manifests to host
      copy:
        src: "../k8s/"
        dest: /opt/minecraft/k8s/
        mode: '0644'

    - name: Apply namespace
      shell: /usr/local/bin/k3s kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml apply --validate=false -f /opt/minecraft/k8s/namespace.yml
      changed_when: false

    - name: Apply ConfigMap
      shell: /usr/local/bin/k3s kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml apply --validate=false -f /opt/minecraft/k8s/configmap.yml
      changed_when: false

    - name: Apply PVC
      shell: /usr/local/bin/k3s kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml apply --validate=false -f /opt/minecraft/k8s/pvc.yml
      changed_when: false

    - name: Apply Deployment
      shell: /usr/local/bin/k3s kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml apply --validate=false -f /opt/minecraft/k8s/deployment.yml
      changed_when: false

    - name: Apply Service
      shell: /usr/local/bin/k3s kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml apply --validate=false -f /opt/minecraft/k8s/service.yml
      changed_when: false

    - name: Apply backup CronJob
      shell: /usr/local/bin/k3s kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml apply --validate=false -f /opt/minecraft/k8s/backup-cronjob.yml
      changed_when: false

    - name: Wait for Minecraft deployment to be available
      shell: |
        /usr/local/bin/k3s kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml wait \
          --for=condition=available \
          deployment/minecraft -n minecraft --timeout=300s
      changed_when: false
