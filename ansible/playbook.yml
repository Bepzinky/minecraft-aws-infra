---
- name: Bootstrap k3s
  hosts: all
  become: true
  vars:
    aws_region: "us-east-1"
    data_dir: "/opt/minecraft/data"

  tasks:

    - name: Install required packages
      yum:
        name:
          - docker
          - python3-pip
          - curl
          - unzip
        state: present

    - name: Install AWS CLI
      shell: |
        curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
        unzip -q /tmp/awscliv2.zip -d /tmp
        /tmp/aws/install --update
      args:
        creates: /usr/local/bin/aws

    - name: Install compatible urllib3 and requests
      pip:
        name:
          - "urllib3<2.0"
          - "requests"
        executable: pip3

    - name: Install k3s
      shell: |
        curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s
      shell: k3s kubectl get nodes
      register: k3s_ready
      retries: 15
      delay: 10
      until: k3s_ready.rc == 0
      changed_when: false

    - name: Create credential provider bin directory
      file:
        path: /usr/local/bin
        state: directory
        mode: '0755'

    - name: Download ECR binary
      get_url:
        url: "https://github.com/kubernetes/cloud-provider-aws/releases/download/v1.27.1/ecr-credential-provider-linux-amd64"
        dest: /usr/local/bin/ecr-credential-provider
        mode: '0755'

    - name: Create k3s config directory
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: '0755'

    - name: Write credential provider config
      copy:
        dest: /etc/rancher/k3s/credential-provider-config.yaml
        mode: '0644'
        content: |
          apiVersion: kubelet.config.k8s.io/v1
          kind: CredentialProviderConfig
          providers:
            - name: ecr-credential-provider
              matchImages:
                - "*.dkr.ecr.*.amazonaws.com"
              defaultCacheDuration: "12h"
              apiVersion: credentialproviders.kubelet.k8s.io/v1

    - name: Write k3s config
      copy:
        dest: /etc/rancher/k3s/config.yaml
        mode: '0644'
        content: |
          kubelet-arg:
            - "image-credential-provider-config=/etc/rancher/k3s/credential-provider-config.yaml"
            - "image-credential-provider-bin-dir=/usr/local/bin"

    - name: Restart k3s
      service:
        name: k3s
        state: restarted

    - name: Wait for k3s
      shell: k3s kubectl get nodes
      register: k3s_ready2
      retries: 15
      delay: 10
      until: k3s_ready2.rc == 0
      changed_when: false

    - name: Create world data directory
      file:
        path: "{{ data_dir }}"
        state: directory
        owner: "1000"
        group: "1000"
        mode: '0755'

    - name: Restore world data
      shell: |
        aws s3 sync s3://{{ s3_bucket }}/world/ {{ data_dir }}/ --no-progress
      changed_when: false

    - name: Fix permissions after restore
      file:
        path: "{{ data_dir }}"
        state: directory
        owner: "1000"
        group: "1000"
        mode: '0755'
        recurse: true

    - name: Copy k8s manifests
      copy:
        src: "../k8s/"
        dest: /opt/minecraft/k8s/
        mode: '0644'

    - name: Apply namespace
      shell: k3s kubectl apply -f /opt/minecraft/k8s/namespace.yml
      changed_when: false

    - name: Apply ConfigMap
      shell: k3s kubectl apply -f /opt/minecraft/k8s/configmap.yml
      changed_when: false

    - name: Apply PVC
      shell: k3s kubectl apply -f /opt/minecraft/k8s/pvc.yml
      changed_when: false

    - name: Apply Deployment
      shell: k3s kubectl apply -f /opt/minecraft/k8s/deployment.yml
      changed_when: false

    - name: Apply Service
      shell: k3s kubectl apply -f /opt/minecraft/k8s/service.yml
      changed_when: false

    - name: Apply backup CronJob
      shell: k3s kubectl apply -f /opt/minecraft/k8s/backup-cronjob.yml
      changed_when: false

    - name: Wait for Minecraft deployment to be available
      shell: |
        k3s kubectl wait --for=condition=available \
          deployment/minecraft -n minecraft --timeout=300s
      changed_when: false
